<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exit Permit Verification</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;

    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

    background:#f2f3f5;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.card{
    width:100%;
    max-width:380px;

    background:#ffffff;

    border-radius:18px;

    box-shadow:0 8px 20px rgba(0,0,0,0.08);

    padding:22px;
}

.title{
    text-align:center;

    color:#2f80ed;

    font-size:24px;
    font-weight:700;

    margin-bottom:18px;
}

.status-box{
    background:#f6ffed;

    border:2px solid #8fd18b;
    border-left:6px solid #52c41a;

    border-radius:12px;

    padding:16px;

    margin-bottom:22px;

    display:flex;
    gap:12px;

    align-items:flex-start;
}

.check-icon{
    width:30px;
    height:30px;

    min-width:30px;

    background:#52c41a;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#ffffff;

    font-size:16px;
    font-weight:700;
}

.status-text{
    font-size:15px;
    line-height:1.5;

    color:#444444;
}

.status-text strong{
    display:block;

    font-size:16px;
    font-weight:700;

    margin-bottom:4px;

    color:#333333;
}

table{
    width:100%;

    border-collapse:collapse;

    overflow:hidden;

    border-radius:12px;

    font-size:15px;
}

td{
    padding:14px 12px;

    border:1px solid #e5e5e5;
}

td:first-child{
    width:45%;

    background:#fafafa;

    color:#5e5d5d;

    font-weight:600;
}

td:last-child{
    color:#222222;

    font-weight:400;
}

</style>
</head>

<body>

<div class="card">

    <div class="title">
        EXIT PERMIT Verification
    </div>

    <div class="status-box">

        <div class="check-icon">
            ✓
        </div>

        <div class="status-text">
            <strong>VALID EXIT PERMIT</strong>
            This exit permit is currently valid and active.
        </div>

    </div>

    <table>

        <tr>
            <td>Permit ID</td>
            <td>16203</td>
        </tr>

        <tr>
            <td>Vessel</td>
            <td>BIBI GOL</td>
        </tr>

        <tr>
            <td>IMO</td>
            <td>-</td>
        </tr>

        <tr>
            <td>Port</td>
            <td>Khor Al-Zubair Port</td>
        </tr>

        <tr>
            <td>Arrival Date</td>
            <td>30-Apr-2026</td>
        </tr>

        <tr>
            <td>Departure Date</td>
            <td>01-May-2026</td>
        </tr>

    </table>

</div>

</body>
</html>
